<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProofReader — TTB Label Compliance</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: sans-serif;
  font-size: 14px;
  color: #222;
  background: #f5f5f5;
}

/* ── Header ── */
header {
  background: #fff;
  border-bottom: 1px solid #ddd;
  margin-bottom: 1.25em;
}
header .inner {
  max-width: 980px;
  margin: 0 auto;
  padding: 0.65em 1em;
  display: flex;
  align-items: center;
  gap: 0.75em;
}
header h1   { font-size: 1.1em; }
header .sub { font-size: 0.82em; color: #777; flex: 1; }

.conn-status {
  font-size: 0.8em;
  padding: 0.2em 0.55em;
  border-radius: 3px;
  white-space: nowrap;
  transition: background 0.3s, color 0.3s;
}
.conn-ok   { background: #d4edda; color: #155724; }
.conn-warn { background: #fff3cd; color: #856404; }

/* ── Page body ── */
.page { max-width: 980px; margin: 0 auto; padding: 0 1em 2em; }

/* ── Upload zone ── */
.upload-zone {
  border: 2px dashed #bbb;
  border-radius: 6px;
  padding: 1.5em 1em;
  text-align: center;
  cursor: pointer;
  background: #fff;
  margin-bottom: 1.25em;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.upload-zone:hover,
.upload-zone.drag-over { border-color: #0d6efd; background: #eef4ff; }
.upload-zone strong    { font-size: 0.95em; }
.upload-zone p         { font-size: 0.82em; color: #777; margin-top: 0.3em; }
.upload-zone input     { display: none; }

/* ── Three-pane grid ── */
.panes {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0.75em;
  align-items: start;
  margin-bottom: 1.25em;
}
@media (max-width: 680px) {
  .panes { grid-template-columns: 1fr; }
}

.pane {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 5px;
  overflow: hidden;
}
.pane-head {
  padding: 0.5em 0.65em;
  border-bottom: 1px solid #eee;
  font-size: 0.85em;
  font-weight: 600;
  color: #444;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pane-count {
  font-size: 0.78em;
  font-weight: normal;
  color: #888;
  background: #f0f0f0;
  border-radius: 8px;
  padding: 0.1em 0.45em;
  min-width: 1.6em;
  text-align: center;
}
.pane-search {
  width: 100%;
  border: none;
  border-bottom: 1px solid #eee;
  padding: 0.4em 0.65em;
  font-size: 0.82em;
  outline: none;
  background: #fafafa;
}
.pane-search:focus { background: #fff; border-bottom-color: #0d6efd; }
.pane-cards {
  min-height: 60px;
  max-height: 420px;
  overflow-y: auto;
}

/* ── Job card ── */
.job-card {
  display: flex;
  align-items: flex-start;
  gap: 0.55em;
  padding: 0.55em 0.65em;
  border-bottom: 1px solid #f0f0f0;
}
.job-card:last-child { border-bottom: none; }

.job-thumb {
  width: 40px;
  min-width: 40px;
  height: 54px;
  object-fit: contain;
  border: 1px solid #e0e0e0;
  border-radius: 2px;
  background: #fafafa;
  margin-top: 1px;
}
.job-thumb-placeholder {
  width: 40px;
  min-width: 40px;
  height: 54px;
  background: #fafafa;
  border: 1px solid #e0e0e0;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1em;
  color: #ccc;
  margin-top: 1px;
}

.job-meta       { flex: 1; min-width: 0; }
.job-filename   { font-size: 0.85em; font-weight: 500; white-space: nowrap;
                  overflow: hidden; text-overflow: ellipsis; }
.job-id         { font-size: 0.72em; color: #aaa; font-family: monospace;
                  margin-top: 0.1em; white-space: nowrap; }
.job-actions    { margin-top: 0.35em; display: flex; align-items: center;
                  gap: 0.4em; flex-wrap: wrap; }

/* ── Badges ── (same palette as report templates) ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3em;
  padding: 0.15em 0.45em;
  border-radius: 3px;
  font-size: 0.75em;
  font-weight: bold;
  white-space: nowrap;
}
.badge-PASS,          .badge-EXEMPT        { background: #d4edda; color: #155724; }
.badge-WARN,          .badge-ABSENT        { background: #fff3cd; color: #856404; }
.badge-FAIL,          .badge-ERROR         { background: #f8d7da; color: #721c24; }
.badge-INDETERMINATE                       { background: #e2e3e5; color: #383d41; }
.badge-queued,        .badge-processing    { background: #e2e3e5; color: #383d41; }

.btn-report {
  display: inline-block;
  padding: 0.15em 0.5em;
  font-size: 0.75em;
  border: 1px solid #bbb;
  border-radius: 3px;
  background: #fff;
  color: #222;
  text-decoration: none;
  white-space: nowrap;
}
.btn-report:hover { background: #f0f0f0; text-decoration: none; }

.btn-delete {
  display: inline-block;
  padding: 0.15em 0.5em;
  font-size: 0.75em;
  border: 1px solid #ddd;
  border-radius: 3px;
  background: #fff;
  color: #aaa;
  cursor: pointer;
  white-space: nowrap;
  line-height: inherit;
  min-width: 5em;         /* wide enough for "Confirm"; prevents layout shift */
  text-align: center;
  margin-left: auto;      /* right-justify within the flex job-actions row */
}
.btn-delete:hover { background: #fff0f0; border-color: #e0a0a0; color: #c00; }
.btn-delete-confirm {
  background: #fff0f0;
  border-color: #dc3545;
  color: #dc3545;
  font-weight: 600;
}
.btn-delete-confirm:hover { background: #dc3545; color: #fff; }

.pane-empty {
  padding: 1em 0.65em;
  font-size: 0.82em;
  color: #bbb;
  text-align: center;
}

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 9px; height: 9px;
  border: 2px solid #bbb;
  border-top-color: #555;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  flex-shrink: 0;
}

/* ── Log panel ── */
.log-panel {
  border: 1px solid #ddd;
  border-radius: 5px;
  overflow: hidden;
  background: #fff;
}
.log-toggle {
  padding: 0.5em 0.75em;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  font-size: 0.85em;
  font-weight: 600;
  color: #444;
}
.log-toggle:hover  { background: #fafafa; }
.log-body {
  height: 160px;
  overflow-y: auto;
  font-family: monospace;
  font-size: 0.76em;
  line-height: 1.5;
  padding: 0.35em 0.6em;
  background: #1e1e1e;
  color: #ccc;
}
.log-body.collapsed { display: none; }
.log-line           { white-space: pre-wrap; word-break: break-all; }
.log-line.WARN      { color: #e5c07b; }
.log-line.ERROR     { color: #e06c75; }

/* ── Thumbnail hover preview ── */
#thumb-preview {
  display: none;
  position: fixed;
  z-index: 1000;
  pointer-events: none;       /* transparent to mouse events; doesn't trigger mouseout on img */
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  padding: 4px;
  max-width: 280px;
}
#thumb-preview img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 2px;
}
</style>
</head>
<body>

<header>
  <div class="inner">
    <h1>ProofReader</h1>
    <span class="sub">TTB Form 5100.31 — Label Compliance Pre-Screener</span>
    <span class="conn-status conn-warn" id="connStatus">◌ Connecting…</span>
  </div>
</header>

<div class="page">

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" multiple accept=".pdf">
    <strong>Drop PDF files here</strong> or click to browse
    <p>Accepts TTB Form 5100.31 submissions. Multiple files at once are fine.</p>
  </div>

  <!-- Three panes -->
  <div class="panes">
    <div class="pane" id="pane-queued">
      <div class="pane-head">
        Queued
        <span class="pane-count" id="count-queued">0</span>
      </div>
      <input class="pane-search" id="search-queued" type="search" placeholder="filter…" autocomplete="off">
      <div class="pane-cards" id="cards-queued"></div>
    </div>
    <div class="pane" id="pane-progress">
      <div class="pane-head">
        In Progress
        <span class="pane-count" id="count-progress">0</span>
      </div>
      <input class="pane-search" id="search-progress" type="search" placeholder="filter…" autocomplete="off">
      <div class="pane-cards" id="cards-progress"></div>
    </div>
    <div class="pane" id="pane-done">
      <div class="pane-head">
        Done
        <span class="pane-count" id="count-done">0</span>
      </div>
      <input class="pane-search" id="search-done" type="search" placeholder="filter…" autocomplete="off">
      <div class="pane-cards" id="cards-done"></div>
    </div>
  </div>

  <!-- Thumbnail hover preview (global, positioned via JS) -->
  <div id="thumb-preview"><img src="" alt=""></div>

  <!-- Log panel -->
  <div class="log-panel">
    <div class="log-toggle" id="logToggle">
      <span>Live Log</span>
      <span id="logArrow">▼</span>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

</div>

<script>
"use strict";

// ── State ─────────────────────────────────────────────────────────────────────

const jobs          = new Map();   // job_id → job object
const myJobs        = new Set();   // job_ids submitted this session (for notifications)
const pendingDelete = new Map();   // job_id → revert-timer id (two-state delete button)
const queries       = { queued: "", progress: "", done: "" };

// ── Pane definitions ──────────────────────────────────────────────────────────

const PANES = [
  {
    key:    "queued",
    filter: j => j.status === "queued",
    sort:   (a, b) => (a.submitted_at ?? 0) - (b.submitted_at ?? 0),   // asc: oldest first
  },
  {
    key:    "progress",
    filter: j => j.status === "processing",
    sort:   (a, b) => (b.submitted_at ?? 0) - (a.submitted_at ?? 0),   // desc: newest first
  },
  {
    key:    "done",
    filter: j => j.status === "complete" || j.status === "error",
    sort:   (a, b) => (b.submitted_at ?? 0) - (a.submitted_at ?? 0),   // desc: newest first
  },
];

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function verdictBadge(job) {
  if (job.status === "queued")
    return `<span class="badge badge-queued">QUEUED</span>`;
  if (job.status === "processing")
    return `<span class="badge badge-processing"><span class="spinner"></span>PROCESSING</span>`;
  if (job.status === "error" && !job.verdict)
    return `<span class="badge badge-ERROR">ERROR</span>`;
  if (job.verdict)
    return `<span class="badge badge-${esc(job.verdict)}">${esc(job.verdict)}</span>`;
  return `<span class="badge badge-queued">—</span>`;
}

function reportLink(job) {
  if (job.status !== "complete") return "";
  return `<a class="btn-report" href="/results/${esc(job.job_id)}/report.html" target="_blank">Report ↗</a>`;
}

function deleteButton(job) {
  if (job.status !== "complete" && job.status !== "error") return "";
  const id = esc(job.job_id);
  if (pendingDelete.has(job.job_id)) {
    return `<button class="btn-delete btn-delete-confirm" data-job-id="${id}" data-confirm="true">Confirm</button>`;
  }
  return `<button class="btn-delete" data-job-id="${id}" data-confirm="false">Delete</button>`;
}

function cardHtml(job) {
  const id = esc(job.job_id);
  const fn = esc(job.original_filename ?? job.job_id);
  return `<div class="job-card">
  <img class="job-thumb" src="/results/${id}/thumbnail.jpg"
       onerror="this.style.display='none';this.nextSibling.style.display='flex';" alt="">
  <div class="job-thumb-placeholder" style="display:none">📄</div>
  <div class="job-meta">
    <div class="job-filename" title="${fn}">${fn}</div>
    <div class="job-id">${id}</div>
    <div class="job-actions">
      ${verdictBadge(job)}${reportLink(job)}${deleteButton(job)}
    </div>
  </div>
</div>`;
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function renderPane(pane) {
  const q       = queries[pane.key].toLowerCase();
  const cardsEl = document.getElementById(`cards-${pane.key}`);
  const countEl = document.getElementById(`count-${pane.key}`);

  let list = [...jobs.values()].filter(pane.filter);
  list.sort(pane.sort);

  // Update count (total, before search filter)
  if (countEl) countEl.textContent = list.length;

  // Apply search filter
  if (q) {
    list = list.filter(j =>
      (j.original_filename ?? "").toLowerCase().includes(q) ||
      j.job_id.includes(q)
    );
  }

  cardsEl.innerHTML = list.length
    ? list.map(cardHtml).join("")
    : `<div class="pane-empty">${q ? "No matches." : "Empty."}</div>`;
}

function renderAll() {
  for (const pane of PANES) renderPane(pane);
}

// ── Data ──────────────────────────────────────────────────────────────────────

async function loadJobs() {
  try {
    const resp = await fetch("/results");
    if (!resp.ok) return;
    const list = await resp.json();
    // Merge: update existing entries, add new ones, keep myJobs intact
    for (const j of list) {
      const existing = jobs.get(j.job_id);
      jobs.set(j.job_id, existing ? Object.assign(existing, j) : j);
    }
    renderAll();
  } catch (_) { /* server not yet ready */ }
}

// Poll every 5 s to catch queued → processing transitions (no SSE event for that)
setInterval(loadJobs, 5000);

// ── Upload ────────────────────────────────────────────────────────────────────

let notifRequested = false;

async function uploadFiles(files) {
  const pdfs = [...files].filter(f => f.name.toLowerCase().endsWith(".pdf"));
  if (!pdfs.length) return;

  // Ask for notification permission once, on the user's first upload gesture
  if (!notifRequested && "Notification" in window && Notification.permission === "default") {
    notifRequested = true;
    Notification.requestPermission();
  }

  const form = new FormData();
  pdfs.forEach(f => form.append("files", f));

  let results;
  try {
    const resp = await fetch("/upload", { method: "POST", body: form });
    if (!resp.ok) return;
    results = await resp.json();
  } catch (_) { return; }

  for (const r of results) {
    if (r.job_id) {
      jobs.set(r.job_id, {
        job_id:            r.job_id,
        status:            r.status ?? "queued",
        original_filename: r.filename,
        verdict:           null,
        submitted_at:      Date.now() / 1000,
      });
      myJobs.add(r.job_id);
    }
  }
  renderAll();
}

const zone      = document.getElementById("uploadZone");
const fileInput = document.getElementById("fileInput");

zone.addEventListener("click",    ()  => fileInput.click());
fileInput.addEventListener("change", e => { uploadFiles(e.target.files); fileInput.value = ""; });
zone.addEventListener("dragover",  e  => { e.preventDefault(); zone.classList.add("drag-over"); });
zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
zone.addEventListener("drop", e => {
  e.preventDefault();
  zone.classList.remove("drag-over");
  uploadFiles(e.dataTransfer.files);
});

// ── Search ────────────────────────────────────────────────────────────────────

for (const pane of PANES) {
  document.getElementById(`search-${pane.key}`).addEventListener("input", e => {
    queries[pane.key] = e.target.value;
    renderPane(pane);
  });
}

// ── Connection status ─────────────────────────────────────────────────────────

let eventsOk = false;
let logsOk   = false;

function updateConnStatus() {
  const el  = document.getElementById("connStatus");
  const ok  = eventsOk && logsOk;
  el.className   = "conn-status " + (ok ? "conn-ok" : "conn-warn");
  el.textContent = ok ? "● Live" : "◌ Reconnecting…";
}

// ── Browser notifications ─────────────────────────────────────────────────────

function notifyDone(job) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  const verdict = job.verdict ?? "complete";
  new Notification(`ProofReader — ${verdict}`, {
    body: job.original_filename ?? job.job_id,
    tag:  job.job_id,   // deduplicate if event fires twice
  });
}

// ── SSE: job completion events ────────────────────────────────────────────────

function connectEvents() {
  const es = new EventSource("/events");

  es.onopen = () => {
    eventsOk = true;
    updateConnStatus();
  };

  es.onmessage = e => {
    const data = JSON.parse(e.data);
    const job  = jobs.get(data.job_id);
    if (job) {
      job.status  = "complete";
      job.verdict = data.verdict;
      renderAll();
      if (myJobs.has(data.job_id)) notifyDone(job);
    } else {
      // Job arrived via watchdog inbox drop — refresh full list
      loadJobs();
    }
  };

  es.onerror = () => {
    eventsOk = false;
    updateConnStatus();
    es.close();
    setTimeout(connectEvents, 3000);
  };
}

// ── SSE: log stream ───────────────────────────────────────────────────────────

const logBody = document.getElementById("logBody");
let atBottom  = true;

logBody.addEventListener("scroll", () => {
  atBottom = logBody.scrollTop + logBody.clientHeight >= logBody.scrollHeight - 24;
});

function appendLog(line) {
  const div = document.createElement("div");
  div.className = "log-line" +
    (/ WARNING /.test(line) ? " WARN" : / ERROR /.test(line) ? " ERROR" : "");
  div.textContent = line;
  logBody.appendChild(div);
  if (atBottom) logBody.scrollTop = logBody.scrollHeight;
  // Cap at 2 000 lines to prevent unbounded growth
  while (logBody.children.length > 2000) logBody.removeChild(logBody.firstChild);
}

function connectLogs() {
  const es = new EventSource("/logs");

  es.onopen = () => {
    logsOk = true;
    updateConnStatus();
  };

  es.onmessage = e => appendLog(e.data);

  es.onerror = () => {
    logsOk = false;
    updateConnStatus();
    es.close();
    setTimeout(connectLogs, 3000);
  };
}

// ── Log panel toggle ──────────────────────────────────────────────────────────

document.getElementById("logToggle").addEventListener("click", () => {
  const collapsed = logBody.classList.toggle("collapsed");
  document.getElementById("logArrow").textContent = collapsed ? "▶" : "▼";
});

// ── Thumbnail hover preview ───────────────────────────────────────────────────

const thumbPreview     = document.getElementById("thumb-preview");
const thumbPreviewImg  = thumbPreview.querySelector("img");
let   thumbHoverTimer  = null;

function showThumbPreview(img) {
  thumbPreviewImg.src = img.src;
  thumbPreview.style.display = "block";

  const rect   = img.getBoundingClientRect();
  const pw     = thumbPreview.offsetWidth  || 288;  // fallback before layout
  const ph     = thumbPreview.offsetHeight || 200;
  const gap    = 10;

  // Prefer right of the element; fall back to left if viewport too narrow
  let left = rect.right + gap;
  if (left + pw > window.innerWidth - 8) left = rect.left - pw - gap;
  left = Math.max(8, left);

  // Align top with the element; clamp so preview stays within viewport
  let top = rect.top;
  top = Math.max(8, Math.min(top, window.innerHeight - ph - 8));

  thumbPreview.style.left = left + "px";
  thumbPreview.style.top  = top  + "px";
}

function hideThumbPreview() {
  clearTimeout(thumbHoverTimer);
  thumbPreview.style.display = "none";
}

// Event delegation: attach once to document rather than to each re-rendered card
document.addEventListener("mouseover", e => {
  const img = e.target.closest(".job-thumb");
  if (!img || !img.naturalWidth) return;   // skip placeholder-replaced images
  clearTimeout(thumbHoverTimer);
  thumbHoverTimer = setTimeout(() => showThumbPreview(img), 350);
});

document.addEventListener("mouseout", e => {
  if (e.target.closest(".job-thumb")) hideThumbPreview();
});

// ── Delete (two-state: Delete → Confirm → execute) ───────────────────────────

async function performDelete(jobId) {
  try {
    const resp = await fetch(`/results/${encodeURIComponent(jobId)}`, { method: "DELETE" });
    if (resp.ok) {
      jobs.delete(jobId);
      myJobs.delete(jobId);
      renderAll();
    }
  } catch (_) { /* server unreachable; leave card in place */ }
}

document.addEventListener("click", e => {
  const btn = e.target.closest(".btn-delete");
  if (!btn) return;

  const jobId     = btn.dataset.jobId;
  const isPending = btn.dataset.confirm === "true";

  if (!isPending) {
    // First click: arm the confirm state and start a 1.5 s revert timer
    btn.dataset.confirm = "true";
    btn.textContent = "Confirm";
    btn.classList.add("btn-delete-confirm");

    const timer = setTimeout(() => {
      pendingDelete.delete(jobId);
      // Re-render so the button reverts to "Delete" even if card DOM was reused
      renderAll();
    }, 2000);
    pendingDelete.set(jobId, timer);
  } else {
    // Second click within the window: cancel timer and execute
    clearTimeout(pendingDelete.get(jobId));
    pendingDelete.delete(jobId);
    performDelete(jobId);
  }
});

// Revert "Confirm" → "Delete" when the cursor leaves the button
document.addEventListener("mouseout", e => {
  const btn = e.target.closest(".btn-delete");
  if (!btn || btn.dataset.confirm !== "true") return;
  // relatedTarget is where the cursor is going; if still inside the button, do nothing
  if (btn.contains(e.relatedTarget)) return;
  const jobId = btn.dataset.jobId;
  clearTimeout(pendingDelete.get(jobId));
  pendingDelete.delete(jobId);
  renderAll();
});

// ── Boot ──────────────────────────────────────────────────────────────────────

loadJobs().then(() => {
  connectEvents();
  connectLogs();
});
</script>
</body>
</html>
